<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h2>Soma de 1 até 100</h2>
    <button onclick="soma()">Calcular</button>

    <script>
        function soma() {
            let total = 0;
            for (let i = 1; i <= 100; i++) {
                total += i;
            }
            alert(total);
        }
    </script>

</body>

</html>
