<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <h2>Ímpares de 1 a 10</h2>
    <button onclick="impares()">Mostrar</button>

    <script>
        function impares() {
            let res = "";
            for (let i = 1; i <= 10; i++) {
                if (i % 2 !== 0) res += i + " ";
            }
            alert(res);
        }
    </script>

</body>

</html>
